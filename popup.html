<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allowed Channels</title>
    <style>
        /* ------------------------------------- Basic styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
        }

        h3 {
            text-align: left;
            color: #2c3e50;
            margin: 0 0 10px 0;
        }

        /* ------------------------------------- Container */
        .container {
            width: 400px;
            min-width: 350px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .config-container {
            width: 90%;
            min-width: 350px;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 1px 1px 6px 4px rgba(0, 0, 0, 0.1);
        }

        /* ------------------------------------- Toggle switch styling */
        .toggle-container {
            display: flex;
            align-items: center;
            margin-top: 30px;
        }

        .toggle-label {
            margin-right: 10px;
            font-size: 14px;
            color: #2c3e50;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            border-radius: 20px;
            transition: 0.4s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.4s;
        }

        input:checked+.slider {
            background-color: #3498db;
        }

        input:checked+.slider:before {
            transform: translateX(18px);
        }

        /* ------------------------------------- shorts-toggle-tooltip */
        .shorts-toggle-tooltip {
            font-size: 10px;
            color: #0000008f;
        }

        /* ------------------------------------- Group cards */
        #groups-container {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .group-card {
            border: 2px solid #dde3ea;
            border-radius: 8px;
            padding: 12px;
            background-color: #f9fbfc;
            transition: border-color 0.2s;
        }

        .group-card.group-active {
            border-color: #3498db;
            background-color: #eaf4fb;
        }

        .group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .group-name-input {
            font-size: 15px;
            font-weight: 600;
            color: #2c3e50;
            border: none;
            border-bottom: 1px dashed transparent;
            background: transparent;
            outline: none;
            flex: 1;
            margin-right: 10px;
            cursor: text;
        }

        .group-name-input:hover,
        .group-name-input:focus {
            border-bottom-color: #3498db;
        }

        /* ------------------------------------- Delete group button */
        .delete-group-btn {
            margin-left: 8px;
            padding: 2px 7px;
            background-color: transparent;
            color: #aaa;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
        }

        .delete-group-btn:hover {
            background-color: #e74c3c;
            border-color: #e74c3c;
            color: white;
        }

        /* ------------------------------------- Channel list inside group */
        .allowed-channels {
            list-style-type: none;
            padding: 0;
            margin: 0 0 10px 0;
        }

        .channel-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #ecf0f1;
            padding: 8px 10px;
            border-radius: 5px;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .group-active .channel-item {
            background-color: #d6eaf8;
        }

        .channel-item button {
            padding: 3px 8px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .channel-item button:hover {
            background-color: #c0392b;
        }

        /* ------------------------------------- Add channel row inside group */
        .add-channel-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .channel-input {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 13px;
        }

        .add-btn {
            padding: 7px 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .add-btn:hover {
            background-color: #2980b9;
        }

        /* ------------------------------------- New group row */
        .new-group-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }

        #new-group-input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 13px;
        }

        #new-group-btn {
            padding: 8px 14px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        #new-group-btn:hover {
            background-color: #27ae60;
        }

        /* ------------------------------------- review prompt */
        #review-prompt {
            background-color: #eaf4fb;
            border: 1px solid #3498db;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 14px;
            font-size: 13px;
            color: #2c3e50;
        }

        #review-prompt p {
            margin: 0 0 8px 0;
        }

        #review-prompt-actions {
            display: flex;
            gap: 8px;
        }

        #review-rate-btn {
            padding: 5px 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        #review-rate-btn:hover {
            background-color: #2980b9;
        }

        #review-later-btn,
        #review-never-btn {
            padding: 5px 12px;
            background-color: transparent;
            color: #7f8c8d;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        #review-later-btn:hover,
        #review-never-btn:hover {
            background-color: #ecf0f1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="config-container">
            <!-- Review prompt banner -->
            <div id="review-prompt" style="display: none;">
                <p>Enjoying the filter? You've blocked a bunch of distractions! A quick review helps
                    others find it.</p>
                <div id="review-prompt-actions">
                    <button id="review-rate-btn">Rate it</button>
                    <button id="review-later-btn">Maybe later</button>
                    <button id="review-never-btn">Don't ask again</button>
                </div>
            </div>
            <hr>

            <!-- Toggle switch for Filter Activation -->
            <div class="toggle-container" style="margin-top: 0px;">
                <label class="toggle-label" for="activate-filter-toggle"
                    style="font-weight: bold; font-size: large;">Activate Youtube Channel Filter</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="activate-filter-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <hr>

            <!-- Toggle switch to block YouTube Shorts -->
            <div class="toggle-container">
                <label class="toggle-label" for="shorts-toggle">Block YouTube Shorts</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="shorts-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <span class="shorts-toggle-tooltip">Blocking shorts works only when filter is ON</span>

            <hr>

            <!-- Channel groups -->
            <h3>Channel Groups</h3>
            <div id="groups-container"></div>

            <!-- Create new group -->
            <div class="new-group-row">
                <input type="text" id="new-group-input" placeholder="New group name" />
                <button id="new-group-btn">+ New Group</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
